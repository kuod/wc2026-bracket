<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1024">
<title>Leaderboard — World Cup 2026 Knockout Predictor</title>
<meta name="description" content="Live leaderboard and pool stats for the 2026 World Cup knockout predictor.">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg?v=6868df6949fb">
<link rel="stylesheet" href="assets/style.css?v=6868df6949fb">
</head>
<body class="on-leaderboard">

<div class="page">

  <!-- Same slim top bar as the predictor, so the two pages feel like one app. -->
  <header class="topbar">
    <h1 class="brand">
      The <em>Leaderboard</em>
      <span class="brand-sub">FIFA World Cup 2026 · Scoring</span>
    </h1>

    <div class="scoring-key">
      <span class="key-chip">R32 <b>1</b></span>
      <span class="key-chip">R16 <b>2</b></span>
      <span class="key-chip">QF <b>3</b></span>
      <span class="key-chip">SF <b>5</b></span>
      <span class="key-chip">Final <b>8</b></span>
    </div>

    <span class="spacer"></span>

    <div class="topbar-tools">
      <nav class="nav-pills">
        <a href="index.html">Predict</a>
        <a href="score.html" class="current">Leaderboard</a>
      </nav>
    </div>
  </header>

  <main class="lb-dashboard">

    <!-- Hero scoreboard banner — its own top-level band so it reads as the page's
         headline, not a label glued to the bracket. It leads as the first item on
         every viewport (desktop by source order; phones pin it first via CSS
         `order` — see the portrait / ≤820px blocks in style.css). -->
    <div class="canvas-head">
      <h2 class="ch-title" id="canvas-title">Live Results</h2>
      <span class="ch-score" id="canvas-score"></span>
      <span class="ch-hint" id="canvas-hint">Click a name below to see their bracket · click again for live results</span>
    </div>

    <!-- The persistent bracket canvas: shows real results by default, morphs to
         a selected person's picks when their row is clicked. -->
    <section id="bracket-canvas">
      <div class="bracket-region" id="bracket-canvas-root"><!-- rendered by score-app.js --></div>
      <!-- Projection legend: shown under the bracket only in the live-results
           view once a pool consensus is drawn (toggled by score-app.js). -->
      <p id="canvas-proj-note" class="canvas-proj-note" hidden></p>
    </section>

    <!-- Lower zone: ranked-list selector on the left, pool stats on the right. -->
    <section class="lb-lower">
      <div class="lb-listwrap">
        <p id="results-stamp" class="results-stamp"></p>
        <p id="lb-status" class="lb-status" role="status" aria-live="polite"></p>
        <div id="leaderboard-root"><!-- rendered by score-app.js --></div>
      </div>

      <div class="lb-stats">
        <div id="pool-stats-root"></div>
      </div>
    </section>

  </main>

  <footer class="site-footer">Made with <span class="footer-heart">&hearts;</span> by David, Maria, and Ayaan</footer>

</div>

<script src="assets/version-check.js?v=6868df6949fb"></script>
<script src="assets/config.js?v=6868df6949fb"></script>
<script src="assets/bracket-data.js?v=6868df6949fb"></script>
<script src="assets/results-overrides.js?v=6868df6949fb"></script>
<script src="assets/results-data.js"></script>
<script src="assets/score-app.js?v=6868df6949fb"></script>
<script>initScorePage();</script>
</body>
</html>
