name: Update leaderboard results

# Pulls real knockout results from TheSportsDB and commits the regenerated
# assets/results-data.js so GitHub Pages serves fresh scores. The browser never
# calls the API itself -- this job is the single source of results.
#
# NOTE: GitHub's scheduled crons are best-effort and run in UTC; they routinely
# lag 5-20+ min under load and can be skipped at the top of the hour. So we run
# OFTEN during the knockout window (every ~20 min on match days) and offset off
# the hour, rather than trying to hit a single exact minute. Use the "Run
# workflow" button (workflow_dispatch) to force an immediate refresh any time.

on:
  workflow_dispatch: {}
  schedule:
    # Knockout window is late Jun -> ~Jul 19 2026 (UTC). Cron can't express a
    # date range, so we gate by month+day-of-month and fire every 20 min during
    # the UTC hours when matches play and finish (~late afternoon to past
    # midnight UTC, given US kickoff times). Off-window days never run.
    - cron: "*/20 16-23 28-30 6 *"   # Jun 28-30: R32 opening days
    - cron: "3,23,43 0-3 29-30 6 *"  # post-midnight UTC spill from Jun 28/29 nights
    - cron: "*/20 16-23 1-19 7 *"    # Jul 1-19: R32 tail -> Final
    - cron: "3,23,43 0-3 1-20 7 *"   # post-midnight UTC spill from Jun 30 + Jul nights

permissions:
  contents: write   # needed to commit the regenerated results file

# Serialize against BOTH this workflow and stamp-version.yml so the two jobs
# that push to main never race (shared group).
concurrency:
  group: site-commit
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Regenerate results-data.js
        run: python3 tools/update_leaderboard.py

      # Snapshot everyone's predictions into predictions-data.js so the leaderboard
      # paints the real board on first frame (the browser then does a best-effort
      # live refresh). Predictions are NON-CRITICAL: the script already exits 0 and
      # leaves the last-good file on any fetch failure, and continue-on-error is the
      # belt-and-suspenders so even an unexpected crash here can never abort the
      # results + version commit below (results isolation is the invariant).
      - name: Snapshot predictions-data.js
        continue-on-error: true
        run: python3 tools/update_predictions.py

      # Refresh version.json's resultsGeneratedAt so open leaderboards hot-swap
      # the new results. (siteVersion is unchanged unless code changed, so this
      # won't trigger a page reload — only a smooth in-place results update.)
      - name: Stamp version.json
        run: python3 tools/stamp_version.py

      - name: Commit if results or predictions changed
        run: |
          # Guard over EVERY file the two generators or the stamper can touch:
          # results-data.js + predictions-data.js (data), version.json (stamp
          # output), and index.html/score.html (stamp rewrites their ?v= if code
          # ever changed). Staging score.html here is what keeps a data-only run
          # from leaving it dirty and un-added, which would break the rebase below.
          FILES="assets/results-data.js assets/predictions-data.js assets/version.json score.html index.html"
          if git diff --quiet -- $FILES; then
            echo "No results/predictions change; nothing to commit."
            exit 0
          fi
          git config user.name "wc2026-results-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add $FILES
          git commit -m "Auto-update results + predictions"
          # Another push may have landed since checkout; rebase before pushing.
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
