<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1024">
<title>2026 World Cup Knockout Predictor</title>
<meta name="description" content="Pick your winners through every round of the 2026 World Cup knockout stage.">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg?v=0fc89fcba4ed">
<link rel="stylesheet" href="assets/style.css?v=0fc89fcba4ed">
</head>
<body>

<div class="page">

  <!-- Slim top bar mirrors the leaderboard's ordered layout so the two pages feel
       like one app: brand (1) · content (2) · spacer (3) · nav pills (4). The name
       box + progress stack live in .topbar-entry; Clear/Submit sit beside them; the
       Predict/Leaderboard pills stay pinned top-right on line 1. -->
  <header class="topbar">
    <h1 class="brand">
      Pick the <em>Bracket</em>
      <span class="brand-sub">FIFA World Cup 2026 · Knockout</span>
    </h1>

    <div class="topbar-content">
      <div class="topbar-entry">
        <div class="field-group" style="margin:0;">
          <input type="text" id="predictor-name" placeholder="Your name — e.g. David K." autocomplete="name" aria-label="Your name">
        </div>
        <div class="progress-bar">
          <span id="progress-label">0 / 31</span>
          <div class="progress-track" aria-hidden="true"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
        </div>
      </div>

      <div class="topbar-actions">
        <button class="btn btn-ghost" id="reset-btn">Clear</button>
        <button class="btn btn-primary" id="submit-btn" disabled>Submit</button>
        <span id="submit-hint" class="submit-hint" hidden>🔒 Submissions closed — the Round of 32 is complete.</span>
      </div>
    </div>

    <span class="spacer"></span>

    <div class="topbar-tools">
      <nav class="nav-pills">
        <a href="index.html" class="current">Predict</a>
        <a href="score.html">Leaderboard</a>
      </nav>
    </div>
  </header>

  <!-- The bracket fills the rest of the viewport. -->
  <main class="bracket-region" id="bracket-root"><!-- rendered by app.js --></main>

  <footer class="site-footer">Made with <span class="footer-heart">&hearts;</span> by David, Maria, and Ayaan</footer>

</div>

<!-- Submit confirmation: a transient toast, not an appended block (keeps the
     page exactly one screen). app.js toggles .is-shown. -->
<div class="toast" id="submit-toast" hidden>
  <strong id="submit-toast-title">Bracket submitted!</strong>
  <span id="submit-status"></span>
  <details>
    <summary>Show / copy JSON</summary>
    <textarea class="json-box" id="submit-json-preview" readonly></textarea>
  </details>
  <button class="toast-close" id="submit-toast-close" aria-label="Dismiss">×</button>
</div>

<script src="assets/version-check.js?v=0fc89fcba4ed"></script>
<script src="assets/config.js?v=0fc89fcba4ed"></script>
<script src="assets/bracket-data.js?v=0fc89fcba4ed"></script>
<script src="assets/app.js?v=0fc89fcba4ed"></script>
<script>initPredictorPage();</script>
</body>
</html>
